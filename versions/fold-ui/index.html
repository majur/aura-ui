<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tactile Mono - Aura UI</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="tm-console">
    <nav class="tm-top">
      <strong>Tactile Mono</strong>
      <a href="/">verzie</a>
    </nav>

    <section class="tm-head">
      <p>03 / html components</p>
      <h1>Minimal controls with physical feedback.</h1>
    </section>

    <section class="tm-panel" aria-label="Control samples">
      <article class="tm-module">
        <h2>Pressable actions</h2>
        <div class="tm-row">
          <button class="tm-button">Commit</button>
          <button class="tm-button" data-surface="flat">Diff</button>
          <button class="tm-button" data-surface="warm">Ship</button>
        </div>
      </article>

      <article class="tm-module">
        <h2>Inputs</h2>
        <label class="tm-field">
          <span>Package</span>
          <input class="tm-input" value="@aura/ui" />
        </label>
        <label class="tm-field">
          <span>Notes</span>
          <textarea class="tm-input tm-textarea">No gradients. No generic glass. Real affordance.</textarea>
        </label>
      </article>

      <article class="tm-module">
        <h2>Switches</h2>
        <label class="tm-switch">
          <input type="checkbox" checked />
          <span>Reduced motion</span>
        </label>
        <label class="tm-switch">
          <input type="checkbox" />
          <span>High contrast</span>
        </label>
      </article>

      <article class="tm-module">
        <h2>Range</h2>
        <label class="tm-field">
          <span>Radius</span>
          <input class="tm-range" type="range" min="0" max="12" value="3" />
        </label>
      </article>

      <details class="tm-module" open>
        <summary>Details</summary>
        <p>Subtle depth is reserved for interactive controls, not every container.</p>
      </details>
    </section>
  </main>
</body>
</html>
