<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura UI - Tactile comparison</title>
  <style>
    @layer reset, page;
    @layer reset {
      * { box-sizing: border-box; }
      body, h1, h2, p { margin: 0; }
      a { color: inherit; }
    }
    @layer page {
      :root {
        color-scheme: light dark;
        --bg: oklch(94% 0.015 250);
        --case: oklch(90% 0.014 250);
        --top: oklch(98% 0.004 250);
        --text: oklch(17% 0.018 250);
        --muted: oklch(48% 0.018 250);
        --line: oklch(66% 0.018 250);
        --cool: oklch(42% 0.1 248);
        --shadow: oklch(62% 0.018 250);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: oklch(16% 0.018 250);
          --case: oklch(22% 0.018 250);
          --top: oklch(29% 0.018 250);
          --text: oklch(92% 0.012 250);
          --muted: oklch(69% 0.018 250);
          --line: oklch(42% 0.018 250);
          --cool: oklch(72% 0.1 248);
          --shadow: oklch(8% 0.012 250);
        }
      }
      body {
        min-height: 100svh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.45;
      }
      main {
        width: min(920px, calc(100% - 24px));
        margin-inline: auto;
        padding: 28px 0 48px;
      }
      header {
        display: grid;
        gap: 12px;
        padding-bottom: 20px;
      }
      h1 {
        max-width: 11ch;
        font-size: clamp(46px, 15vw, 96px);
        line-height: .92;
        letter-spacing: 0;
      }
      p { max-width: 58ch; color: var(--muted); }
      nav {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 270px), 1fr));
        gap: 14px;
      }
      a {
        display: grid;
        gap: 10px;
        min-height: 160px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--top), var(--case));
        box-shadow: 0 8px 0 var(--shadow);
        text-decoration: none;
      }
      a:active { transform: translateY(5px); box-shadow: 0 3px 0 var(--shadow); }
      strong { font-size: 24px; line-height: 1; }
      span { color: var(--muted); }
      code {
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 9px;
        color: var(--cool);
        font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Aura UI tactile comparison</h1>
      <p>Dva smery vedľa seba: pôvodný striedmy Tactile Mono a nová priestorovejšia verzia Tactile Depth.</p>
    </header>
    <nav aria-label="Aura UI comparison">
      <a href="/versions/fold-ui/">
        <code>current</code>
        <strong>Tactile Mono</strong>
        <span>Striedme fyzické ovládače, jemná haptická logika.</span>
      </a>
      <a href="/versions/tactile-depth/">
        <code>new</code>
        <strong>Tactile Depth</strong>
        <span>Priestorovejšie komponenty s hlbšími vrstvami, hranami a stlačením.</span>
      </a>
    </nav>
  </main>
</body>
</html>
