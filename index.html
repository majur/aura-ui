<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura UI - Tactile Mono</title>
  <style>
    @layer reset, page;
    @layer reset {
      * { box-sizing: border-box; }
      body, h1, p { margin: 0; }
      a { color: inherit; }
    }
    @layer page {
      :root {
        color-scheme: light dark;
        --bg: oklch(94% 0.015 250);
        --case: oklch(90% 0.014 250);
        --text: oklch(17% 0.018 250);
        --muted: oklch(48% 0.018 250);
        --line: oklch(66% 0.018 250);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: oklch(16% 0.018 250);
          --case: oklch(22% 0.018 250);
          --text: oklch(92% 0.012 250);
          --muted: oklch(69% 0.018 250);
          --line: oklch(40% 0.018 250);
        }
      }
      body {
        min-height: 100svh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.45;
      }
      main {
        width: min(820px, calc(100% - 24px));
        margin-inline: auto;
        padding: 34px 0 48px;
      }
      section {
        display: grid;
        gap: 18px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--case);
      }
      h1 {
        max-width: 11ch;
        font-size: clamp(48px, 15vw, 96px);
        line-height: .92;
        letter-spacing: 0;
      }
      p { max-width: 54ch; color: var(--muted); }
      a {
        width: fit-content;
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 13px;
        padding: 9px 15px;
        color: var(--text);
        text-decoration: none;
        font-weight: 780;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Aura UI Tactile Mono</h1>
      <p>Jeden smer frameworku: minimalistické fyzické ovládače, OS-driven dark mode a interakcie postavené na natívnom HTML.</p>
      <a href="/versions/fold-ui/">Otvoriť komponenty</a>
    </section>
  </main>
</body>
</html>
